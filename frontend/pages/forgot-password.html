<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — SmartArena AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="../js/config.js?v=2"></script>
    <script src="../js/firebase-init.js?v=2"></script>
    <script src="../js/auth.js?v=2"></script>
    <link rel="icon" href="/favicon.ico">
</head>
<body class="bg-surface-950 bg-mesh min-h-screen flex items-center justify-center p-4">
    <!-- Back Button (Absolute Top Left) -->
    <a href="../index.html" class="absolute top-6 left-6 inline-flex items-center text-sm text-surface-200/60 hover:text-arena-400 transition-colors z-50">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Home
    </a>

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="../index.html" class="inline-flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-arena-500 to-neon-green flex items-center justify-center text-2xl" aria-hidden="true">
                    🏟️
                </div>
                <span class="text-2xl font-display font-bold text-white">Smart<span class="gradient-text">Arena</span></span>
            </a>
        </div>

        <div class="glass-card p-8">
            <h1 class="text-xl font-display font-bold text-white mb-2 text-center">Reset Password</h1>
            <p class="text-sm text-surface-200/50 text-center mb-8">Enter your email and we'll send you a link to reset your password.</p>

            <div id="message-container" class="hidden text-sm p-3 rounded-xl mb-4 text-center"></div>

            <form id="reset-form" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-surface-200/60 mb-2">Email</label>
                    <input type="email" id="email" required class="w-full bg-surface-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-arena-500 focus:ring-1 focus:ring-arena-500" placeholder="jane@smartarena.ai">
                </div>
                <button type="submit" id="reset-btn" class="w-full bg-arena-500 hover:bg-arena-600 text-white font-medium py-3 rounded-xl transition-colors">
                    Send Reset Link
                </button>
            </form>

            <div class="text-center mt-6">
                <a href="login.html" class="text-sm text-surface-200/60 hover:text-arena-400 transition-colors">
                    ← Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.getElementById('reset-form');
            const msgContainer = document.getElementById('message-container');
            const btn = document.getElementById('reset-btn');

            try {
                await initFirebase();

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    msgContainer.classList.add('hidden');
                    msgContainer.className = 'text-sm p-3 rounded-xl mb-4 text-center';
                    
                    btn.disabled = true;
                    btn.textContent = 'Sending...';

                    const email = document.getElementById('email').value;

                    try {
                        await Auth.resetPassword(email);
                        
                        msgContainer.textContent = 'Reset link sent! Please check your email.';
                        msgContainer.classList.add('bg-green-500/10', 'border', 'border-green-500/20', 'text-green-400');
                        msgContainer.classList.remove('hidden');
                        
                        form.reset();
                    } catch (error) {
                        msgContainer.textContent = error.message;
                        msgContainer.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
                        msgContainer.classList.remove('hidden');
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Send Reset Link';
                    }
                });
            } catch (err) {
                msgContainer.textContent = "Failed to initialize app.";
                msgContainer.classList.add('bg-red-500/10', 'border', 'border-red-500/20', 'text-red-400');
                msgContainer.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
