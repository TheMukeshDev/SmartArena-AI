<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartArena AI — Broadcast Announcements">
    <title>Broadcast Announcements — SmartArena AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    </noscript>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js" defer></script>
    <script src="../js/config.js?v=2" defer></script>
    <script src="../js/firebase-init.js?v=2" defer></script>
    <script src="../js/auth.js?v=2" defer></script>
    <link rel="icon" href="/favicon.ico">
</head>
<body class="bg-surface-950 min-h-screen text-white">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-arena-500 text-white px-4 py-2 rounded z-[100]">Skip to main content</a>

    <nav class="border-b border-white/10 bg-surface-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-6">
                    <a href="dashboard.html" class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg overflow-hidden shadow-glow">
                            <img src="/assets/images/logo.webp" alt="SmartArena Logo" class="w-full h-full object-cover">
                        </div>
                        <span class="text-xl font-display font-bold hidden sm:block">Smart<span class="gradient-text">Arena</span></span>
                    </a>
                    <div class="h-6 w-px bg-white/10 hidden sm:block"></div>
                    <div class="flex items-center gap-4">
                        <a href="dashboard.html" class="text-sm text-surface-200 hover:text-white transition-colors">Dashboard</a>
                        <a href="admin-announcements.html" class="text-sm text-arena-400 font-medium border-b-2 border-arena-400 pb-5 translate-y-[10px]">Announcements</a>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button id="logout-btn" class="text-sm text-surface-200 hover:text-white transition-colors">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" tabindex="-1">
        <header class="mb-8">
            <h1 class="text-3xl font-display font-bold mb-2">Broadcast <span class="gradient-text">Announcements</span></h1>
            <p class="text-surface-200 text-sm">Create and manage stadium-wide announcements.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-card p-6 border-arena-500/30">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-arena-400">
                    New Announcement
                </h2>
                <form id="announcement-form" class="space-y-4">
                    <div>
                        <label for="ann-title" class="block text-sm font-medium text-surface-200/60 mb-1">Title</label>
                        <input type="text" id="ann-title" required maxlength="200" placeholder="Gate Closure Notice" class="w-full bg-surface-900 border border-white/10 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-arena-400">
                    </div>
                    <div>
                        <label for="ann-message" class="block text-sm font-medium text-surface-200/60 mb-1">Message</label>
                        <textarea id="ann-message" required rows="4" maxlength="2000" placeholder="Gate B will be closed for maintenance from 6-7 PM..." class="w-full bg-surface-900 border border-white/10 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-arena-400 resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="ann-priority" class="block text-sm font-medium text-surface-200/60 mb-1">Priority</label>
                            <select id="ann-priority" class="w-full bg-surface-900 border border-white/10 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-arena-400">
                                <option value="normal">Normal</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                        <div>
                            <label for="ann-zones" class="block text-sm font-medium text-surface-200/60 mb-1">Target Zones</label>
                            <select id="ann-zones" class="w-full bg-surface-900 border border-white/10 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-arena-400">
                                <option value="">All Zones</option>
                                <option value="North Stand">North Stand</option>
                                <option value="South Stand">South Stand</option>
                                <option value="West Stand">West Stand</option>
                                <option value="East Stand">East Stand</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="ann-submit" class="w-full bg-arena-500 hover:bg-arena-600 text-white font-medium py-2.5 rounded-lg transition-colors">
                        Broadcast Announcement
                    </button>
                </form>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-lg font-bold mb-4">Recent Announcements</h2>
                <div id="ann-list" class="space-y-3">
                    <p class="text-surface-200/40 text-sm text-center py-8">No announcements yet.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('logout-btn').addEventListener('click', () => Auth.logout());
            Admin.initAnnouncementsPage();
        });
    </script>
</body>
</html>
