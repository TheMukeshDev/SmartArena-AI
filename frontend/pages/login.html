<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartArena AI — Login to access your intelligent stadium dashboard.">
    <title>Login — SmartArena AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- Firebase Compat SDKs (v8 syntax) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="../js/config.js?v=2"></script>
    <script src="../js/firebase-init.js?v=2"></script>
    <script src="../js/auth.js?v=2"></script>
</head>
<body class="bg-surface-950 bg-mesh min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Back Button -->
        <div class="mb-4">
            <a href="../index.html" class="inline-flex items-center text-sm text-surface-200/60 hover:text-arena-400 transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Home
            </a>
        </div>
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="../index.html" class="inline-flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl overflow-hidden shadow-glow">
                    <img src="/assets/images/logo.png" alt="SmartArena Logo" class="w-full h-full object-cover">
                </div>
                <span class="text-2xl font-display font-bold text-white">Smart<span class="gradient-text">Arena</span></span>
            </a>
        </div>

        <!-- Login Card -->
        <div class="glass-card p-8">
            <h1 class="text-xl font-display font-bold text-white mb-2 text-center">Welcome Back</h1>
            <p class="text-sm text-surface-200/50 text-center mb-8">Sign in to access your stadium dashboard</p>

            <div id="error-message" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl mb-4 text-center"></div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-surface-200/60 mb-2">Email</label>
                    <input type="email" id="email" required autocomplete="username" class="w-full bg-surface-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-arena-500 focus:ring-1 focus:ring-arena-500" placeholder="admin@smartarena.ai">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-sm font-medium text-surface-200/60">Password</label>
                        <a href="forgot-password.html" class="text-xs text-arena-400 hover:text-arena-300">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" required autocomplete="current-password" class="w-full bg-surface-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-arena-500 focus:ring-1 focus:ring-arena-500" placeholder="••••••••">
                </div>
                <button type="submit" id="login-btn" class="w-full bg-arena-500 hover:bg-arena-600 text-white font-medium py-3 rounded-xl transition-colors">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-xs text-surface-200/40">or</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Google Login -->
            <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-xl border border-white/10 bg-surface-800/50 hover:bg-surface-800 text-white text-sm font-medium transition-colors">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <!-- Signup Link -->
            <div class="text-center mt-6">
                <p class="text-sm text-surface-200/60">
                    Don't have an account? <a href="signup.html" class="text-arena-400 hover:text-arena-300 font-medium">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const loginForm = document.getElementById('login-form');
            const googleBtn = document.getElementById('google-login-btn');
            const errorMsg = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
            }

            try {
                await initFirebase();
                
                // If user is already logged in, redirect to dashboard
                Auth.initAuthListener((user) => {
                    if (user) {
                        window.location.href = 'dashboard.html';
                    }
                });

                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    errorMsg.classList.add('hidden');
                    loginBtn.disabled = true;
                    loginBtn.textContent = 'Signing In...';

                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;

                    try {
                        await Auth.loginWithEmail(email, password);
                        // Listener will redirect
                    } catch (error) {
                        showError(error.message);
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Sign In';
                    }
                });

                googleBtn.addEventListener('click', async () => {
                    errorMsg.classList.add('hidden');
                    try {
                        await Auth.loginWithGoogle();
                        // Listener will redirect
                    } catch (error) {
                        showError(error.message);
                    }
                });

            } catch (err) {
                showError("Failed to initialize app.");
            }
        });
    </script>
</body>
</html>
