<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartArena AI — Sign up for a new account.">
    <title>Sign Up — SmartArena AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    </noscript>
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js" defer></script>

    <script src="../js/config.js?v=2" defer></script>
    <script src="../js/firebase-init.js?v=2" defer></script>
    <script src="../js/auth.js?v=2" defer></script>
    <link rel="icon" href="/favicon.ico">
</head>
<body class="bg-surface-950 bg-mesh min-h-screen flex items-center justify-center p-4">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-arena-500 text-white px-4 py-2 rounded z-[100]">Skip to main content</a>
    
    <!-- Back Button (Absolute Top Left) -->
    <a href="../index.html" class="absolute top-6 left-6 inline-flex items-center text-sm text-surface-200/60 hover:text-arena-400 transition-colors z-50">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Home
    </a>

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="../index.html" class="inline-flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl overflow-hidden shadow-glow">
                    <img src="/assets/images/logo.webp" alt="SmartArena Logo" class="w-full h-full object-cover">
                </div>
                <span class="text-2xl font-display font-bold text-white">Smart<span class="gradient-text">Arena</span></span>
            </a>
        </div>

        <!-- Signup Card -->
        <div class="glass-card p-8" id="main-content" tabindex="-1">
            <h1 class="text-xl font-display font-bold text-white mb-2 text-center">Create an Account</h1>
            <p class="text-sm text-surface-200/50 text-center mb-8">Join the intelligent stadium network</p>

            <div id="error-message" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl mb-4 text-center" role="alert"></div>

            <!-- Signup Form -->
            <form id="signup-form" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-surface-200/60 mb-2">Full Name</label>
                    <input type="text" id="name" required autocomplete="name" class="w-full bg-surface-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-arena-500 focus:ring-1 focus:ring-arena-500" placeholder="Jane Doe">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-surface-200/60 mb-2">Email</label>
                    <input type="email" id="email" required autocomplete="username" class="w-full bg-surface-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-arena-500 focus:ring-1 focus:ring-arena-500" placeholder="jane@smartarena.ai">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-surface-200/60 mb-2">Password</label>
                    <input type="password" id="password" required autocomplete="new-password" minlength="6" class="w-full bg-surface-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-arena-500 focus:ring-1 focus:ring-arena-500" placeholder="••••••••">
                </div>
                <div>
                    <label for="role" class="block text-sm font-medium text-surface-200/60 mb-2">Role</label>
                    <select id="role" class="w-full bg-surface-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-arena-500 focus:ring-1 focus:ring-arena-500" aria-describedby="role-hint">
                        <option value="fan">Fan</option>
                        <option value="volunteer">Volunteer</option>
                    </select>
                    <p id="role-hint" class="text-xs text-surface-200/40 mt-1">Admin role must be assigned by an existing administrator.</p>
                </div>
                <button type="submit" id="signup-btn" class="w-full bg-arena-500 hover:bg-arena-600 text-white font-medium py-3 rounded-xl transition-colors mt-2">
                    Create Account
                </button>
            </form>

            <div class="text-center mt-6">
                <p class="text-sm text-surface-200/60">
                    Already have an account? <a href="login.html" class="text-arena-400 hover:text-arena-300 font-medium">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const signupForm = document.getElementById('signup-form');
            const errorMsg = document.getElementById('error-message');
            const signupBtn = document.getElementById('signup-btn');

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
            }

            try {
                await initFirebase();

                Auth.initAuthListener((user) => {
                    if (user) {
                        window.location.href = 'dashboard.html';
                    }
                });

                signupForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    errorMsg.classList.add('hidden');
                    signupBtn.disabled = true;
                    signupBtn.textContent = 'Creating Account...';

                    const name = document.getElementById('name').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const role = document.getElementById('role').value;

                    try {
                        await Auth.signup(name, email, password, role);
                        // Listener will redirect on success
                    } catch (error) {
                        showError(error.message);
                        signupBtn.disabled = false;
                        signupBtn.textContent = 'Create Account';
                    }
                });
            } catch (err) {
                showError("Failed to initialize app.");
            }
        });
    </script>
</body>
</html>
