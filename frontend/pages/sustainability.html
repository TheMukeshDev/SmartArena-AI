<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartArena AI — Sustainability Dashboard">
    <title>Sustainability — SmartArena AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    </noscript>
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js" defer></script>
    
    <script src="../js/config.js" defer></script>
    <script src="../js/firebase-init.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <link rel="icon" href="/favicon.ico">
</head>
<body class="bg-surface-950 min-h-screen text-white relative">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-arena-500 text-white px-4 py-2 rounded z-[100]">Skip to sustainability dashboard</a>
    
    <!-- Navbar -->
    <nav class="border-b border-white/10 bg-surface-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-6">
                    <a href="dashboard.html" class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg overflow-hidden shadow-glow">
                            <img src="/assets/images/logo.webp" alt="SmartArena Logo" class="w-full h-full object-cover">
                        </div>
                        <span class="text-xl font-display font-bold hidden sm:block">Smart<span class="gradient-text">Arena</span></span>
                    </a>
                    <div class="h-6 w-px bg-white/10 hidden sm:block"></div>
                    <div class="flex items-center gap-4">
                        <a href="dashboard.html" class="text-sm text-surface-200 hover:text-white transition-colors">Dashboard</a>
                        <a href="sustainability.html" class="text-sm text-neon-green font-medium border-b-2 border-neon-green pb-5 translate-y-[10px]">Eco Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <header class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
            <div>
                <h1 class="text-3xl font-display font-bold mb-2">Sustainability <span class="text-neon-green">Hub</span></h1>
                <p class="text-surface-200 text-sm">Real-time environmental impact and resource optimization.</p>
            </div>
            <button id="ai-optimize-btn" class="bg-neon-green hover:bg-green-600 text-surface-950 font-bold py-2 px-6 rounded-xl transition-colors shadow-glow flex items-center gap-2">
                <span aria-hidden="true">🌱</span> Run AI Eco-Optimizer
            </button>
        </header>

        <!-- AI Optimization Result -->
        <div id="ai-eco-panel" class="hidden mb-8 glass-card p-6 border-neon-green/30" aria-live="polite">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-neon-green">AI Optimization Report</h2>
                <span id="ai-eco-status" class="badge badge-success">Optimized</span>
            </div>
            <ul id="ai-eco-recs" class="space-y-2 text-surface-200/90 text-sm list-disc list-inside"></ul>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 border-t-2 border-arena-500">
                <h3 class="text-sm font-medium text-surface-200 mb-4 flex justify-between">Power Consumption <span class="text-arena-400">-4%</span></h3>
                <div class="relative h-48 w-full" role="img" aria-label="Power consumption chart showing 4% reduction">
                    <canvas id="energyChart"></canvas>
                </div>
            </div>
            
            <div class="glass-card p-6 border-t-2 border-neon-blue">
                <h3 class="text-sm font-medium text-surface-200 mb-4 flex justify-between">Water Usage <span class="text-neon-blue">-1.2%</span></h3>
                <div class="relative h-48 w-full" role="img" aria-label="Water usage chart showing 1.2% reduction">
                    <canvas id="waterChart"></canvas>
                </div>
            </div>

            <div class="glass-card p-6 border-t-2 border-neon-green">
                <h3 class="text-sm font-medium text-surface-200 mb-4 flex justify-between">Waste Diverted <span class="text-neon-green">+14%</span></h3>
                <div class="relative h-48 w-full" role="img" aria-label="Waste diversion chart showing 14% improvement">
                    <canvas id="wasteChart"></canvas>
                </div>
            </div>
        </div>

    </main>

    <script src="../js/toast.js"></script>
    <script src="../js/sustainability.js"></script>
</body>
</html>
